name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bun run db:generate
      - name: Run unit tests
        run: bun run test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bun run db:generate
      - name: Push schema
        run: bun run db:push
        env:
          DATABASE_URL: file:./db/test.db
      - name: Seed database
        run: bun run db:seed
        env:
          DATABASE_URL: file:./db/test.db
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: bun run test:e2e
        env:
          DATABASE_URL: file:./db/test.db
          NEXTAUTH_SECRET: ci-test-secret-1234567890
          NEXTAUTH_URL: http://localhost:3000
          REDIS_URL: ''
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bun run db:generate
      - name: Build Next.js
        run: bun run build
        env:
          DATABASE_URL: file:./db/build.db
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:3000
      - name: Verify build artifacts
        run: |
          test -d .next/standalone
          test -d .next/static
          echo "✓ Build artifacts present"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: lumarijschool:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build WS image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ws
          push: false
          tags: lumarijschool-ws:${{ github.sha }}
