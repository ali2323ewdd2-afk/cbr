name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/lumarijschool:latest
            ${{ secrets.DOCKER_REGISTRY }}/lumarijschool:${{ github.sha }}

      - name: Build and push WS image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ws
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/lumarijschool-ws:latest
            ${{ secrets.DOCKER_REGISTRY }}/lumarijschool-ws:${{ github.sha }}

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/opt/lumarijschool/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/lumarijschool
            test -f .env.production || { echo "Missing .env.production. Copy .env.production.example and configure secrets first."; exit 1; }
            docker compose --env-file .env.production config >/dev/null
            # Build and start services (entrypoint handles migrations, seeds, RBAC automatically)
            docker compose --env-file .env.production up -d --build
            # Wait for healthcheck
            echo "Waiting for app to be healthy..."
            for i in {1..60}; do
              if curl -sf http://localhost/api/health | grep -q '"ok":true'; then
                echo "✓ App is healthy"
                break
              fi
              sleep 5
            done
            # Verify
            curl -sf http://localhost/api/health | python3 -m json.tool
            echo "✓ Deploy complete!"

      - name: Notify deployment
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "  Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Time: $(date)"
