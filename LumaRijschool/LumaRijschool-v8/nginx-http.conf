worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1000;
  client_max_body_size 50M;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=tutor:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

  # Upstreams
  upstream nextjs {
    server app:3000;
    keepalive 32;
  }
  upstream wsserver {
    server ws:3001;
    keepalive 32;
  }

  # ─── HTTP Server (always active) ───────────────────────
  server {
    listen 80 default_server;
    server_name lumatheorie.nl www.lumatheorie.nl _;

    # Docker's embedded DNS — lets the optional adminer upstream be resolved at
    # request time so nginx can still boot/serve the app when adminer is absent.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Let's Encrypt HTTP-01 challenge (webroot). Mount a volume at /var/www/certbot
    # and run certbot in webroot mode to issue/renew the certificate.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Static — long cache
    location /_next/static/ {
      limit_req zone=static burst=50 nodelay;
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location ~* \.(svg|png|jpg|jpeg|webp|gif|ico|css|js|woff2?)$ {
      limit_req zone=static burst=50 nodelay;
      proxy_pass http://nextjs;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
    }

    # Auth — strict rate limit
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI Tutor — strict rate limit (cost control)
    location /api/tutor {
      limit_req zone=tutor burst=5 nodelay;
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 90s;
    }

    # Stripe webhook — no rate limit, raw body
    location /api/payments/webhook {
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_request_buffering off;
    }

    # WebSocket — upgrade headers
    location /socket.io/ {
      proxy_pass http://wsserver;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400;
    }

    # API — moderate rate limit
    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Adminer (admin-only path). Resolved at request time (variable upstream) so a
    # missing/optional adminer service yields a 502 here instead of crashing nginx.
    location /adminer/ {
      set $adminer_upstream adminer:8080;
      rewrite ^/adminer/(.*)$ /$1 break;
      proxy_pass http://$adminer_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else
    location / {
      proxy_pass http://nextjs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}